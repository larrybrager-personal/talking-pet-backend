# ---- render.yaml (create this file at repo root) ----
# Paste into render.yaml and commit. Values are provided in Render dashboard, not here.
services:
  - type: web
    name: talking-pet-backend
    env: python
    buildCommand: "python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    autoDeploy: true
    envVars:
      - key: ELEVEN_API_KEY
        sync: false    # set the value in Render → Environment
      - key: DID_API_KEY
        sync: false    # set the value in Render → Environment (format: key:secret if D-ID provides both)
      - key: ALLOWED_ORIGIN
        value: "*"     # set to your frontend origin later
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: SUPABASE_BUCKET
        value: pets     # or your bucket name

  - type: worker
    name: talking-pet-async-worker
    env: python
    buildCommand: "python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "python scripts/run_async_worker.py --limit 1"
    autoDeploy: true
    envVars:
      - key: ELEVEN_API_KEY
        sync: false
      - key: DID_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: SUPABASE_BUCKET
        value: pets
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: API_AUTH_ENABLED
        value: "true"
      - key: API_AUTH_TOKEN
        sync: false
